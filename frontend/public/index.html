<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Substrate Consulting Nexus | Industrial Web3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#0a0a0c',
                        surface: 'rgba(20, 20, 25, 0.9)',
                        mint: {
                            400: '#00ff9d',
                            500: '#00cc7d',
                            glow: 'rgba(0, 255, 157, 0.5)'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'neon': '0 0 10px rgba(0, 255, 157, 0.3), 0 0 20px rgba(0, 255, 157, 0.1)',
                    }
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        /* Custom Animations that Tailwind doesn't create by default without config */
        @keyframes dash {
            to {
                stroke-dashoffset: -100;
            }
        }

        .animate-dash {
            animation: dash 2s linear infinite;
        }
    </style>
</head>

<body class="bg-background text-white h-screen flex justify-center items-center overflow-hidden font-sans">
    <div class="w-full max-w-5xl h-[90vh] flex flex-col gap-8 p-8">
        <!-- Header -->
        <header
            class="flex justify-between items-center p-4 bg-surface border border-mint-500/30 rounded-xl backdrop-blur-md shadow-neon">
            <div class="flex items-center gap-2 text-mint-400 font-mono font-bold tracking-widest text-lg">
                <span>⬡</span>
                <span>NEXUS_OS</span>
            </div>
            <div class="flex items-center gap-3 text-xs font-mono text-gray-400">
                <span class="w-2 h-2 rounded-full bg-mint-400 shadow-[0_0_10px_#00ff9d] animate-pulse"></span>
                <span>PASEO: CONNECTED</span>
            </div>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 flex-grow">
            <!-- Metric Card 1: Network Health -->
            <section
                class="bg-surface border border-white/10 rounded-xl p-6 flex flex-col justify-between hover:border-mint-400 transition-colors duration-300 group hover:shadow-neon">
                <div class="mb-4">
                    <h3 class="font-mono text-xs text-gray-500 mb-2 group-hover:text-mint-400 transition-colors">
                        NETWORK_HEALTH</h3>
                    <span class="text-3xl font-bold font-mono tracking-tighter" id="block-height">#12,456,789</span>
                </div>
                <div>
                    <div class="h-10 w-full border-b border-white/10 relative overflow-hidden mb-4">
                        <svg viewBox="0 0 100 20"
                            class="w-full h-full stroke-mint-400 fill-none stroke-2 [stroke-dasharray:20] animate-dash">
                            <polyline points="0,10 20,10 25,2 30,18 35,10 100,10" />
                        </svg>
                    </div>
                    <div class="flex justify-between text-xs font-mono">
                        <span class="text-gray-500">FINALIZED</span>
                        <span class="text-mint-400 font-bold">YES</span>
                    </div>
                </div>
            </section>

            <!-- Metric Card 2: Coretime Status -->
            <section
                class="bg-surface border border-white/10 rounded-xl p-6 flex flex-col justify-between hover:border-mint-400 transition-colors duration-300 group hover:shadow-neon">
                <div>
                    <h3 class="font-mono text-xs text-gray-500 mb-2 group-hover:text-mint-400 transition-colors">
                        CORETIME_ASSIGNMENT</h3>
                    <span class="text-3xl font-bold font-mono tracking-tighter">PARA_ID 5126</span>
                </div>
                <div>
                    <div
                        class="inline-block px-3 py-1 bg-mint-400/10 text-mint-400 rounded text-xs font-mono mb-4 border border-mint-400/20">
                        ON_DEMAND_ACTIVE
                    </div>
                    <div class="flex justify-between text-xs font-mono mt-2 border-t border-white/5 pt-2">
                        <span class="text-gray-500">REGION</span>
                        <span class="text-white">GLOBAL</span>
                    </div>
                </div>
            </section>

            <!-- Metric Card 3: AI Gatekeeper -->
            <section
                class="bg-surface border border-white/10 rounded-xl p-6 flex flex-col justify-between hover:border-mint-400 transition-colors duration-300 group hover:shadow-neon md:col-span-2 lg:col-span-1">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="font-mono text-xs text-gray-500 group-hover:text-mint-400 transition-colors">
                        AI_GATEKEEPER</h3>
                    <span
                        class="text-xs font-mono text-mint-400 bg-mint-400/10 px-2 py-0.5 rounded border border-mint-400/20">KMS_SECURED</span>
                </div>
                <div class="flex-grow flex flex-col justify-end">
                    <div class="font-mono text-xs space-y-2 max-h-[150px] overflow-hidden" id="audit-log">
                        <div class="flex gap-2 text-gray-500">
                            <span>[14:30:22]</span>
                            <span class="text-white">System Initialized.</span>
                        </div>
                        <div class="flex gap-2 text-gray-500">
                            <span>[14:31:05]</span>
                            <span class="text-white">KMS Link Established.</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>

</html>
