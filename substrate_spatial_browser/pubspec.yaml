name: substrate_spatial_browser
description: Substrate-Aware Network — Mobile Command Center

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # State Management
  provider: ^6.1.0
  rxdart: ^0.27.7

  # Hub Discovery
  multicast_dns: ^0.3.2

  # QR Scanning & Generation
  mobile_scanner: ^5.0.0
  qr_flutter: ^4.1.0

  # Location & Spatial
  geolocator: ^12.0.0
  permission_handler: ^11.0.0

  # DID Identity
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  ed25519_hd_key: ^2.2.0
  bs58check: ^1.0.2

  # UI & Animation
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  connectivity_plus: ^6.0.0

  # HTTP
  http: ^1.2.0

  # Freezed models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
