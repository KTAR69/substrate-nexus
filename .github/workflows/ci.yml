name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - if: contains(matrix.os, 'ubuntu')
        uses: ./.github/actions/free-disk-space
      - if: contains(matrix.os, 'ubuntu')
        uses: ./.github/actions/ubuntu-dependencies
      - if: contains(matrix.os, 'macos')
        uses: ./.github/actions/macos-dependencies

      - name: Build the template
        run: cargo build
        timeout-minutes: 90

      - name: Run clippy
        run: |
          SKIP_WASM_BUILD=1 cargo clippy --all-targets --locked --workspace --quiet
          SKIP_WASM_BUILD=1 cargo clippy --all-targets --all-features --locked --workspace --quiet
        timeout-minutes: 30

      - name: Run the tests
        run: SKIP_WASM_BUILD=1 cargo test
        timeout-minutes: 15

      - name: Build the docs
        run: SKIP_WASM_BUILD=1 cargo doc --workspace --no-deps
        timeout-minutes: 15

  run-node:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - if: contains(matrix.os, 'ubuntu')
        uses: ./.github/actions/free-disk-space
      - if: contains(matrix.os, 'ubuntu')
        uses: ./.github/actions/ubuntu-dependencies
      - if: contains(matrix.os, 'macos')
        uses: ./.github/actions/macos-dependencies

      - name: Build the node individually in release mode
        run: cargo build --package solochain-template-node --release
        timeout-minutes: 90

      - name: Make sure the node is producing blocks
        run: |
          ./target/release/solochain-template-node --dev 2>&1 | tee out.txt &
          until curl -s '127.0.0.1:9944'; do sleep 5; done
          until cat out.txt | grep -s "Imported #2"; do sleep 5; done
        shell: bash
        timeout-minutes: 5

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/free-disk-space

      - name: Build the Dockerfile
        run: docker build . -t polkadot-sdk-solochain-template
        timeout-minutes: 90

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit in root
        run: |
          if [ -f "package.json" ]; then
            echo "Running npm audit in root directory..."
            npm audit --audit-level=moderate || true
          fi
        continue-on-error: true

      - name: Run npm audit in frontend
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "Running npm audit in frontend directory..."
            cd frontend
            npm audit --audit-level=moderate || true
          fi
        continue-on-error: true

      - name: Run npm audit in backend
        run: |
          if [ -f "backend/package.json" ]; then
            echo "Running npm audit in backend directory..."
            cd backend
            npm audit --audit-level=moderate || true
          fi
        continue-on-error: true

      - name: Check for obfuscated code
        run: |
          echo "Checking for obfuscated code patterns..."
          
          # Check for eval() usage
          if grep -r "eval(" --include="*.js" --include="*.ts" --exclude-dir=node_modules --exclude-dir=target .; then
            echo "⚠️ Warning: Found eval() usage"
          fi
          
          # Check for Function constructor
          if grep -r "new Function(" --include="*.js" --include="*.ts" --exclude-dir=node_modules --exclude-dir=target .; then
            echo "⚠️ Warning: Found Function constructor usage"
          fi
          
          echo "✓ Obfuscated code check completed"

      - name: Check for suspicious package scripts
        run: |
          echo "Checking for suspicious package.json scripts..."
          
          # Check all package.json files for preinstall/postinstall scripts
          find . -name "package.json" -not -path "*/node_modules/*" -not -path "*/target/*" | while read file; do
            if grep -E "\"(pre|post)install\":" "$file"; then
              echo "⚠️ Warning: Found install script in $file"
              grep -A 1 -E "\"(pre|post)install\":" "$file"
            fi
          done
          
          echo "✓ Package script check completed"

      - name: Check for hardcoded credentials
        run: |
          echo "Checking for hardcoded credentials..."
          
          # Check for common credential patterns
          if grep -rE "password\s*=\s*['\"][^'\"]{3,}['\"]|api[_-]?key\s*=\s*['\"][^'\"]{10,}['\"]|secret\s*=\s*['\"][^'\"]{10,}['\"]" \
            --include="*.js" --include="*.ts" --include="*.json" --include="*.yml" --include="*.yaml" \
            --exclude-dir=node_modules --exclude-dir=target --exclude-dir=.git \
            . | grep -v "process.env" | grep -v "YOUR_" | grep -v "EXAMPLE" | grep -v "placeholder"; then
            echo "⚠️ Warning: Potential hardcoded credentials found"
          fi
          
          # Check for AWS keys
          if grep -rE "AKIA[0-9A-Z]{16}" --exclude-dir=node_modules --exclude-dir=target --exclude-dir=.git .; then
            echo "⚠️ Warning: Potential AWS access key found"
          fi
          
          # Check for private keys
          if grep -r "BEGIN.*PRIVATE KEY" --exclude-dir=node_modules --exclude-dir=target --exclude-dir=.git .; then
            echo "⚠️ Warning: Private key found"
          fi
          
          echo "✓ Credential check completed"
